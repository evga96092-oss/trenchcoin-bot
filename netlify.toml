[build]
  publish = "public"
  command = "node scripts/render-public-config.js"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://esm.sh; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.up.railway.app https://api.mainnet-beta.solana.com https://solana-rpc.publicnode.com; img-src 'self' data: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-store"

[[redirects]]
  from = "/api/*"
  to = ":splat"
  status = 404
