<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trenchcoin Bot Widget</title>
    <link rel="stylesheet" href="/widget.css">
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f6f6f2;
        color: #161616;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, calc(100vw - 32px));
      }

      h1 {
        font-size: 32px;
        letter-spacing: 0;
      }

      code {
        background: #e8e8df;
        padding: 2px 5px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Trenchcoin widget preview</h1>
      <p>Use the <code>$TRENCH</code> button in the bottom-right corner to test the fixed-knowledge website bot.</p>
    </main>
    <script src="/widget.js"></script>
  </body>
</html>
